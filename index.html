<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私の言葉帖 JSONテスト</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #070505;
      color: #E6DDC8;
      font-family: sans-serif;
      line-height: 1.7;
    }

    .card {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
      background: #12100F;
      border: 1px solid #B49A67;
      border-radius: 16px;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      font-weight: normal;
    }

    p {
      margin: 8px 0;
    }

    label {
      display: block;
      margin-top: 16px;
      color: #B9A98F;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      margin-top: 8px;
      padding: 12px;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #4A3B2A;
      background: #1B1715;
      color: #E6DDC8;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #7E343B;
      color: #E6DDC8;
      font-size: 16px;
    }

    button.secondary {
      background: #1B1715;
      border: 1px solid #B49A67;
    }

    button.danger {
      background: #8A2F35;
    }

    input[type="file"] {
      width: 100%;
      margin-top: 8px;
      color: #E6DDC8;
    }

    .message {
      margin-top: 14px;
      color: #B9A98F;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .line {
      margin: 18px 0;
      border-top: 1px solid #4A3B2A;
    }

    .note {
      color: #B9A98F;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>✦ 私の言葉帖</h1>
    <p>JSONバックアップ確認用のテスト画面です。</p>
    <p class="note">今回は、メモ1件だけを書き出し・復元します。</p>

    <div class="line"></div>

    <label for="memo">テスト用メモ</label>
    <textarea id="memo" placeholder="ここに何か入力してください"></textarea>

    <button id="saveButton">保存する</button>
    <button id="exportButton" class="secondary">JSONを書き出す</button>

    <div class="line"></div>

    <label for="importFile">JSONを読み込む</label>
    <input id="importFile" type="file" accept="application/json,.json">

    <button id="clearButton" class="danger">保存内容を消す</button>

    <p id="message" class="message">まだ操作していません。</p>
  </main>

  <script>
    const storageKey = "kotobacho_json_test_memo";

    const memo = document.getElementById("memo");
    const saveButton = document.getElementById("saveButton");
    const exportButton = document.getElementById("exportButton");
    const importFile = document.getElementById("importFile");
    const clearButton = document.getElementById("clearButton");
    const message = document.getElementById("message");

    const savedText = localStorage.getItem(storageKey);

    if (savedText) {
      memo.value = savedText;
      message.textContent = "保存済みの内容を読み込みました。";
    }

    saveButton.addEventListener("click", function () {
      localStorage.setItem(storageKey, memo.value);
      message.textContent = "保存しました。";
    });

    exportButton.addEventListener("click", function () {
      const data = {
        appName: "私の言葉帖",
        testType: "json-backup-test",
        memo: memo.value,
        exportedAt: new Date().toISOString()
      };

      const jsonText = JSON.stringify(data, null, 2);
      const blob = new Blob([jsonText], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "kotobacho-test-backup.json";
      link.click();

      URL.revokeObjectURL(url);

      message.textContent = "JSONを書き出しました。";
    });

    importFile.addEventListener("change", function () {
      const file = importFile.files[0];

      if (!file) {
        message.textContent = "ファイルが選ばれていません。";
        return;
      }

      const reader = new FileReader();

      reader.onload = function () {
        try {
          const data = JSON.parse(reader.result);

          if (!data || typeof data.memo !== "string") {
            message.textContent = "このJSONは、今回のテスト用形式ではありません。";
            return;
          }

          memo.value = data.memo;
          localStorage.setItem(storageKey, data.memo);
          message.textContent = "JSONを読み込み、内容を復元しました。";
        } catch (error) {
          message.textContent = "JSONの読み込みに失敗しました。";
        }
      };

      reader.readAsText(file);
    });

    clearButton.addEventListener("click", function () {
      const result = confirm("保存内容を消します。よろしいですか？");

      if (!result) {
        message.textContent = "削除をキャンセルしました。";
        return;
      }

      localStorage.removeItem(storageKey);
      memo.value = "";
      message.textContent = "保存内容を消しました。";
    });
  </script>
</body>
</html>
