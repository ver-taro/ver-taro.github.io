<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>私の言葉帖</title>
  <style>
    :root {
      --bg: #070505;
      --card: #12100F;
      --card-light: #1B1715;
      --text: #E6DDC8;
      --subtext: #B9A98F;
      --accent: #7E343B;
      --accent-light: #A65363;
      --gold: #B49A67;
      --line: #4A3B2A;
      --danger: #8A2F35;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;
      background:
        radial-gradient(circle at top, rgba(180, 154, 103, 0.08), transparent 32%),
        linear-gradient(180deg, #0B0908 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Hiragino Sans", "Yu Gothic", serif;
      line-height: 1.75;
      letter-spacing: 0.02em;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding-bottom: 28px;
    }

    header {
      margin-bottom: 18px;
      padding: 18px 16px 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(18, 16, 15, 0.92);
      box-shadow: 0 12px 28px var(--shadow);
      text-align: center;
    }

    .star {
      display: block;
      margin-bottom: 6px;
      color: var(--gold);
      font-size: 20px;
      line-height: 1;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0.14em;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
    }

    .screen { display: none; }

    .screen.active {
      display: block;
      animation: fadeIn 0.18s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .toolbar {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(27, 23, 21, 0.95);
      color: var(--text);
      font-size: 16px;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(180, 154, 103, 0.14);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--subtext);
      opacity: 0.75;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--subtext);
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 13px;
      background: linear-gradient(180deg, var(--accent-light), var(--accent));
      color: var(--text);
      font-size: 16px;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(230, 221, 200, 0.08);
    }

    button:active { transform: translateY(1px); }

    button.secondary {
      background: rgba(27, 23, 21, 0.92);
      border: 1px solid var(--gold);
      color: var(--text);
    }

    button.danger {
      background: rgba(138, 47, 53, 0.86);
      border: 1px solid rgba(166, 83, 99, 0.5);
    }

    .card {
      margin-bottom: 12px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: rgba(18, 16, 15, 0.94);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.26);
    }

    .term-card {
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    .term-card:active { transform: scale(0.995); }

    .term-card:hover { border-color: var(--gold); }

    .term-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 2px;
    }

    .term-title {
      margin: 0;
      font-size: 21px;
      color: var(--text);
      word-break: break-word;
      letter-spacing: 0.05em;
    }

    .term-arrow {
      color: var(--gold);
      font-size: 20px;
      flex: 0 0 auto;
    }

    .term-reading,
    .term-english,
    .term-tags {
      margin: 0 0 6px;
      color: var(--subtext);
      font-size: 14px;
      word-break: break-word;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    }

    .term-preview {
      margin: 8px 0 0;
      color: var(--text);
      font-size: 15px;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .tag-pill {
      display: inline-block;
      margin: 0 5px 5px 0;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--subtext);
      background: rgba(27, 23, 21, 0.8);
      font-size: 12px;
    }

    .date {
      margin-top: 10px;
      color: var(--subtext);
      font-size: 12px;
      text-align: right;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    }

    .detail-title {
      margin-bottom: 2px;
      font-size: 30px;
      word-break: break-word;
      text-align: center;
      letter-spacing: 0.08em;
    }

    .detail-reading {
      margin: 0 0 8px;
      color: var(--subtext);
      text-align: center;
      word-break: break-word;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    }

    .detail-meta {
      margin: 0 0 8px;
      color: var(--subtext);
      text-align: center;
      word-break: break-word;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      font-size: 14px;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 14px auto 22px;
      color: var(--gold);
    }

    .ornament::before,
    .ornament::after {
      content: "";
      width: 72px;
      height: 1px;
      background: var(--gold);
      opacity: 0.7;
    }

    .detail-section {
      margin-top: 14px;
    }

    .detail-section-title {
      margin: 0 0 6px;
      color: var(--gold);
      font-size: 14px;
      letter-spacing: 0.08em;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    }

    .detail-body {
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(18, 16, 15, 0.94);
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    }

    .empty {
      padding: 26px 16px;
      border: 1px dashed var(--line);
      border-radius: 17px;
      color: var(--subtext);
      text-align: center;
      background: rgba(18, 16, 15, 0.72);
    }

    .message,
    .search-status {
      margin: 8px 2px 0;
      color: var(--subtext);
      font-size: 14px;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      white-space: pre-wrap;
    }

    .search-status strong {
      color: var(--text);
      font-weight: 500;
    }

    .line {
      margin: 20px 0;
      border-top: 1px solid var(--line);
    }

    input[type="file"] {
      padding: 10px 0;
      border: none;
      background: transparent;
      color: var(--text);
    }

    .small-note {
      color: var(--subtext);
      font-size: 14px;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    }

    .screen-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(18, 16, 15, 0.88);
      box-shadow: 0 12px 28px var(--shadow);
    }

    .top-link {
      display: inline-block;
      margin-bottom: 14px;
      color: var(--gold);
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    }

    .backup-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(27, 23, 21, 0.8);
    }

    @media (max-width: 480px) {
      body { padding: 14px; }

      header {
        padding: 16px 14px 14px;
        border-radius: 20px;
      }

      h1 { font-size: 25px; }

      .row { flex-direction: column; }

      .detail-title { font-size: 28px; }

      .ornament::before,
      .ornament::after { width: 54px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <span class="star">✦</span>
      <h1>私の言葉帖</h1>
    </header>

    <section id="listScreen" class="screen active">
      <div class="toolbar">
        <div>
          <input id="searchInput" type="search" placeholder="言葉を検索">
          <p id="searchStatus" class="search-status">入力すると自動で検索されます。</p>
        </div>

        <div>
          <label for="sortSelect">並び替え</label>
          <select id="sortSelect">
            <option value="updated">更新日順</option>
            <option value="kana">五十音順</option>
          </select>
        </div>

        <div class="row">
          <button id="addButton">＋ 言葉を追加</button>
          <button id="backupButton" class="secondary">バックアップ</button>
        </div>
      </div>

      <div id="termList"></div>
    </section>

    <section id="formScreen" class="screen">
      <div class="screen-card">
        <span id="cancelTopLink" class="top-link">‹ 戻る</span>
        <h2 id="formTitle">言葉を追加</h2>

        <label for="termInput">用語</label>
        <input id="termInput" type="text" autocomplete="off" placeholder="例）好き">

        <label for="readingInput">読み</label>
        <input id="readingInput" type="text" autocomplete="off" placeholder="例）すき">

        <label for="englishInput">英名</label>
        <input id="englishInput" type="text" autocomplete="off" placeholder="例）love / like">

        <label for="tagsInput">タグ</label>
        <input id="tagsInput" type="text" autocomplete="off" placeholder="例）感情, 恋愛, 好意">

        <label for="detailInput">詳細</label>
        <textarea id="detailInput" placeholder="意味、ニュアンス、使い分けなど。"></textarea>

        <label for="exampleInput">使用例</label>
        <textarea id="exampleInput" placeholder="例）私はリンゴが好き。"></textarea>

        <div class="line"></div>

        <div class="row">
          <button id="saveTermButton">保存する</button>
          <button id="cancelFormButton" class="secondary">キャンセル</button>
        </div>

        <p id="formMessage" class="message"></p>
      </div>
    </section>

    <section id="detailScreen" class="screen">
      <div class="screen-card">
        <span id="backTopLink" class="top-link">‹ 戻る</span>

        <h2 id="detailTerm" class="detail-title"></h2>
        <p id="detailReading" class="detail-reading"></p>
        <p id="detailEnglish" class="detail-meta"></p>
        <div id="detailTags" class="detail-meta"></div>

        <div class="ornament">✦</div>

        <div class="detail-section">
          <p class="detail-section-title">詳細</p>
          <div id="detailBody" class="detail-body"></div>
        </div>

        <div class="detail-section">
          <p class="detail-section-title">使用例</p>
          <div id="detailExample" class="detail-body"></div>
        </div>

        <p id="detailDates" class="date"></p>

        <div class="line"></div>

        <div class="row">
          <button id="editButton">編集する</button>
          <button id="backFromDetailButton" class="secondary">戻る</button>
        </div>

        <button id="deleteButton" class="danger">削除する</button>
      </div>
    </section>

    <section id="backupScreen" class="screen">
      <div class="screen-card">
        <span id="backBackupTopLink" class="top-link">‹ 戻る</span>
        <h2>バックアップ</h2>

        <div class="backup-box">
          <p class="small-note">
            JSONを書き出すと、現在の言葉をバックアップファイルとして保存できます。
          </p>
          <button id="exportButton">JSONを書き出す</button>
        </div>

        <div class="backup-box">
          <p class="small-note">
            JSONを読み込むと、現在の保存内容が読み込んだ内容で置き換わります。
            必要なら先に書き出してください。
          </p>

          <label for="importFile">JSONを読み込む</label>
          <input id="importFile" type="file" accept="application/json,.json">
        </div>

        <div class="line"></div>

        <button id="backFromBackupButton" class="secondary">戻る</button>

        <p id="backupMessage" class="message"></p>
      </div>
    </section>
  </div>

  <script>
    const storageKey = "watashi_no_kotobacho_terms_v1";
    const sortStorageKey = "watashi_no_kotobacho_sort_v1";

    let terms = [];
    let currentTermId = null;
    let editingTermId = null;

    const screens = {
      list: document.getElementById("listScreen"),
      form: document.getElementById("formScreen"),
      detail: document.getElementById("detailScreen"),
      backup: document.getElementById("backupScreen")
    };

    const searchInput = document.getElementById("searchInput");
    const searchStatus = document.getElementById("searchStatus");
    const sortSelect = document.getElementById("sortSelect");
    const termList = document.getElementById("termList");

    const addButton = document.getElementById("addButton");
    const backupButton = document.getElementById("backupButton");

    const formTitle = document.getElementById("formTitle");
    const termInput = document.getElementById("termInput");
    const readingInput = document.getElementById("readingInput");
    const englishInput = document.getElementById("englishInput");
    const tagsInput = document.getElementById("tagsInput");
    const detailInput = document.getElementById("detailInput");
    const exampleInput = document.getElementById("exampleInput");
    const saveTermButton = document.getElementById("saveTermButton");
    const cancelFormButton = document.getElementById("cancelFormButton");
    const cancelTopLink = document.getElementById("cancelTopLink");
    const formMessage = document.getElementById("formMessage");

    const detailTerm = document.getElementById("detailTerm");
    const detailReading = document.getElementById("detailReading");
    const detailEnglish = document.getElementById("detailEnglish");
    const detailTags = document.getElementById("detailTags");
    const detailBody = document.getElementById("detailBody");
    const detailExample = document.getElementById("detailExample");
    const detailDates = document.getElementById("detailDates");
    const editButton = document.getElementById("editButton");
    const deleteButton = document.getElementById("deleteButton");
    const backFromDetailButton = document.getElementById("backFromDetailButton");
    const backTopLink = document.getElementById("backTopLink");

    const exportButton = document.getElementById("exportButton");
    const importFile = document.getElementById("importFile");
    const backFromBackupButton = document.getElementById("backFromBackupButton");
    const backBackupTopLink = document.getElementById("backBackupTopLink");
    const backupMessage = document.getElementById("backupMessage");

    function showScreen(name) {
      Object.values(screens).forEach(function (screen) {
        screen.classList.remove("active");
      });

      screens[name].classList.add("active");
      window.scrollTo(0, 0);
    }

    function createId() {
      return "term-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function formatDate(isoText) {
      if (!isoText) return "";

      const date = new Date(isoText);

      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return date.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
    }

    function normalizeTerm(item) {
      const now = new Date().toISOString();

      return {
        id: item.id || createId(),
        term: String(item.term || ""),
        reading: String(item.reading || ""),
        english: String(item.english || ""),
        tags: String(item.tags || ""),
        detail: String(item.detail || ""),
        example: String(item.example || ""),
        createdAt: item.createdAt || now,
        updatedAt: item.updatedAt || now
      };
    }

    function loadTerms() {
      const saved = localStorage.getItem(storageKey);

      if (!saved) {
        terms = [];
        return;
      }

      try {
        const parsed = JSON.parse(saved);

        if (Array.isArray(parsed)) {
          terms = parsed.map(normalizeTerm);
          saveTerms();
        } else {
          terms = [];
        }
      } catch (error) {
        terms = [];
      }
    }

    function saveTerms() {
      localStorage.setItem(storageKey, JSON.stringify(terms));
    }

    function loadSort() {
      const savedSort = localStorage.getItem(sortStorageKey);

      if (savedSort === "kana" || savedSort === "updated") {
        sortSelect.value = savedSort;
      }
    }

    function saveSort() {
      localStorage.setItem(sortStorageKey, sortSelect.value);
    }

    function getSortKey(item) {
      return (item.reading || item.term || "").trim();
    }

    function getSortedTerms() {
      const list = [...terms];

      if (sortSelect.value === "kana") {
        return list.sort(function (a, b) {
          return getSortKey(a).localeCompare(getSortKey(b), "ja-JP", {
            sensitivity: "base",
            numeric: true
          });
        });
      }

      return list.sort(function (a, b) {
        return new Date(b.updatedAt).getTime() - new Date(a.updatedAt).getTime();
      });
    }

    function getFilteredTerms() {
      const keyword = searchInput.value.trim().toLowerCase();
      let list = getSortedTerms();

      if (keyword) {
        list = list.filter(function (item) {
          return (
            item.term.toLowerCase().includes(keyword) ||
            item.reading.toLowerCase().includes(keyword) ||
            item.english.toLowerCase().includes(keyword) ||
            item.tags.toLowerCase().includes(keyword) ||
            item.detail.toLowerCase().includes(keyword) ||
            item.example.toLowerCase().includes(keyword)
          );
        });
      }

      return list;
    }

    function splitTags(tagsText) {
      return String(tagsText || "")
        .split(/[、,]/)
        .map(function (tag) {
          return tag.trim();
        })
        .filter(Boolean);
    }

    function renderTags(container, tagsText) {
      const tags = splitTags(tagsText);
      container.innerHTML = "";

      if (tags.length === 0) {
        container.style.display = "none";
        return;
      }

      container.style.display = "block";

      tags.forEach(function (tag) {
        const span = document.createElement("span");
        span.className = "tag-pill";
        span.textContent = tag;
        container.appendChild(span);
      });
    }

    function updateSearchStatus(filteredCount) {
      const keyword = searchInput.value.trim();

      if (!keyword) {
        searchStatus.textContent = "入力すると自動で検索されます。";
        return;
      }

      searchStatus.innerHTML = "「<strong></strong>」で検索中：" + filteredCount + "件";
      searchStatus.querySelector("strong").textContent = keyword;
    }

    function renderList() {
      const keyword = searchInput.value.trim();
      const list = getFilteredTerms();

      termList.innerHTML = "";
      updateSearchStatus(list.length);

      if (terms.length === 0) {
        termList.innerHTML = `
          <div class="empty">
            <p>まだ言葉は登録されていません。</p>
            <p>「＋ 言葉を追加」から、最初の言葉を記録できます。</p>
          </div>
        `;
        return;
      }

      if (keyword && list.length === 0) {
        termList.innerHTML = `
          <div class="empty">
            <p>該当する言葉が見つかりません。</p>
          </div>
        `;
        return;
      }

      list.forEach(function (item) {
        const card = document.createElement("div");
        card.className = "card term-card";

        const preview = item.detail
          ? item.detail.slice(0, 84) + (item.detail.length > 84 ? "…" : "")
          : "詳細は登録されていません。";

        card.innerHTML = `
          <div class="term-title-row">
            <h2 class="term-title"></h2>
            <span class="term-arrow">›</span>
          </div>
          <p class="term-reading"></p>
          <p class="term-english"></p>
          <div class="term-tags"></div>
          <p class="term-preview"></p>
          <p class="date"></p>
        `;

        card.querySelector(".term-title").textContent = item.term;
        card.querySelector(".term-reading").textContent = item.reading ? "読み：" + item.reading : "";
        card.querySelector(".term-english").textContent = item.english ? "英名：" + item.english : "";
        renderTags(card.querySelector(".term-tags"), item.tags);
        card.querySelector(".term-preview").textContent = preview;
        card.querySelector(".date").textContent = "更新日 " + formatDate(item.updatedAt);

        card.addEventListener("click", function () {
          openDetail(item.id);
        });

        termList.appendChild(card);
      });
    }

    function openAddForm() {
      editingTermId = null;
      formTitle.textContent = "言葉を追加";
      termInput.value = "";
      readingInput.value = "";
      englishInput.value = "";
      tagsInput.value = "";
      detailInput.value = "";
      exampleInput.value = "";
      formMessage.textContent = "";
      showScreen("form");

      setTimeout(function () {
        termInput.focus();
      }, 80);
    }

    function openEditForm(id) {
      const item = terms.find(function (term) {
        return term.id === id;
      });

      if (!item) return;

      editingTermId = id;
      formTitle.textContent = "言葉を編集";
      termInput.value = item.term;
      readingInput.value = item.reading;
      englishInput.value = item.english;
      tagsInput.value = item.tags;
      detailInput.value = item.detail;
      exampleInput.value = item.example;
      formMessage.textContent = "";
      showScreen("form");
    }

    function saveForm() {
      const termText = termInput.value.trim();
      const readingText = readingInput.value.trim();
      const englishText = englishInput.value.trim();
      const tagsText = tagsInput.value.trim();
      const detailText = detailInput.value.trim();
      const exampleText = exampleInput.value.trim();

      if (!termText) {
        formMessage.textContent = "用語を入力してください。";
        return;
      }

      const now = new Date().toISOString();

      if (editingTermId) {
        const item = terms.find(function (term) {
          return term.id === editingTermId;
        });

        if (!item) return;

        item.term = termText;
        item.reading = readingText;
        item.english = englishText;
        item.tags = tagsText;
        item.detail = detailText;
        item.example = exampleText;
        item.updatedAt = now;

        currentTermId = item.id;
      } else {
        const newTerm = {
          id: createId(),
          term: termText,
          reading: readingText,
          english: englishText,
          tags: tagsText,
          detail: detailText,
          example: exampleText,
          createdAt: now,
          updatedAt: now
        };

        terms.push(newTerm);
        currentTermId = newTerm.id;
      }

      saveTerms();
      renderList();
      openDetail(currentTermId);
    }

    function openDetail(id) {
      const item = terms.find(function (term) {
        return term.id === id;
      });

      if (!item) {
        renderList();
        showScreen("list");
        return;
      }

      currentTermId = id;

      detailTerm.textContent = item.term;

      detailReading.textContent = item.reading ? "読み：" + item.reading : "";
      detailReading.style.display = item.reading ? "block" : "none";

      detailEnglish.textContent = item.english ? "英名：" + item.english : "";
      detailEnglish.style.display = item.english ? "block" : "none";

      renderTags(detailTags, item.tags);

      detailBody.textContent = item.detail || "詳細は登録されていません。";
      detailExample.textContent = item.example || "使用例は登録されていません。";

      detailDates.textContent =
        "登録日 " + formatDate(item.createdAt) + " ／ 更新日 " + formatDate(item.updatedAt);

      showScreen("detail");
    }

    function deleteCurrentTerm() {
      if (!currentTermId) return;

      const result = confirm("この用語を削除します。よろしいですか？");

      if (!result) return;

      terms = terms.filter(function (term) {
        return term.id !== currentTermId;
      });

      currentTermId = null;
      saveTerms();
      renderList();
      showScreen("list");
    }

    function exportJson() {
      const data = {
        appName: "私の言葉帖",
        version: 2,
        exportedAt: new Date().toISOString(),
        terms: terms
      };

      const jsonText = JSON.stringify(data, null, 2);
      const blob = new Blob([jsonText], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "watashi-no-kotobacho-backup.json";
      link.click();

      URL.revokeObjectURL(url);
      backupMessage.textContent = "JSONを書き出しました。";
    }

    function importJson(file) {
      if (!file) {
        backupMessage.textContent = "ファイルが選ばれていません。";
        return;
      }

      const reader = new FileReader();

      reader.onload = function () {
        try {
          const data = JSON.parse(reader.result);

          if (!data || !Array.isArray(data.terms)) {
            backupMessage.textContent = "JSONの読み込みに失敗しました。";
            return;
          }

          const result = confirm(
            "JSONを読み込むと、現在の保存内容が読み込んだ内容で置き換わります。よろしいですか？"
          );

          if (!result) {
            backupMessage.textContent = "読み込みをキャンセルしました。";
            return;
          }

          terms = data.terms
            .map(normalizeTerm)
            .filter(function (item) {
              return item.term.trim();
            });

          saveTerms();
          renderList();
          importFile.value = "";
          backupMessage.textContent = "JSONを読み込み、内容を復元しました。";
          showScreen("list");
        } catch (error) {
          backupMessage.textContent = "JSONの読み込みに失敗しました。";
        }
      };

      reader.readAsText(file);
    }

    function goBackToList() {
      renderList();
      showScreen("list");
    }

    addButton.addEventListener("click", openAddForm);

    backupButton.addEventListener("click", function () {
      backupMessage.textContent = "";
      showScreen("backup");
    });

    searchInput.addEventListener("input", renderList);

    sortSelect.addEventListener("change", function () {
      saveSort();
      renderList();
    });

    saveTermButton.addEventListener("click", saveForm);

    cancelFormButton.addEventListener("click", goBackToList);
    cancelTopLink.addEventListener("click", goBackToList);

    editButton.addEventListener("click", function () {
      openEditForm(currentTermId);
    });

    deleteButton.addEventListener("click", deleteCurrentTerm);

    backFromDetailButton.addEventListener("click", goBackToList);
    backTopLink.addEventListener("click", goBackToList);

    exportButton.addEventListener("click", exportJson);

    importFile.addEventListener("change", function () {
      importJson(importFile.files[0]);
    });

    backFromBackupButton.addEventListener("click", goBackToList);
    backBackupTopLink.addEventListener("click", goBackToList);

    loadTerms();
    loadSort();
    renderList();
  </script>
</body>
</html>
